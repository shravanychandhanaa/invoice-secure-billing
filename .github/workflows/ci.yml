name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Bandit Security Scan
      run: |
        bandit -r app/

    - name: Build Docker Image
      run: |
        docker build -t invoice-app .

    - name: Checking images
      run: |
        docker images | grep invoice-app

    - name: Trivy — scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: invoice-app
        severity: CRITICAL,HIGH
        exit-code: '1'
        ignore-unfixed: true   # only fail on things you can actually fix

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      run: |
        docker tag invoice-app shravanychandhanaa/invoice-app
        docker push shravanychandhaaa/invoice-app